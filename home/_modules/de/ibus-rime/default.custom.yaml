patch:
  switches:
    - name: ascii_mode # english input
      reset: 0 # for some reason doesn't disable english input
      states: [中文]
    - name: full_shape
      reset: 0
      states: [半角]
    - name: simplification
      reset: 0  # default traditional
      states: [漢字, 汉字]

  schema_list:
    - schema: bopomofo

  ascii_composer/good_old_caps_lock: false
  ascii_composer/switch_key: noop # disable any key to switch to english

  key_binder/bindings:
    - { when: always, accept: Shift+space, toggle: simplification }
